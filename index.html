function getResult(sc) {
  let max=0, top=null, sMax=0, second=null;
  for(const [k,v] of Object.entries(sc)){
    if(v>max){sMax=max;second=top;max=v;top=k;}
    else if(v>sMax){sMax=v;second=k;}
  }
  return { top: top||"예스남발러", second };
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}
function wrapText(ctx, text, maxW, fontSize) {
  const words = text.split("");
  const lines = [];
  let cur = "";
  for (const ch of words) {
    const test = cur + ch;
    if (ctx.measureText(test).width > maxW && cur) {
      lines.push(cur); cur = ch;
    } else { cur = test; }
  }
  if (cur) lines.push(cur);
  return lines;
}

              <button onClick={handlePrev} style={{background:"none",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,color:"rgba(255,255,255,0.6)",padding:"2px 8px",fontSize:11,fontFamily:"'Pretendard',-apple-system,sans-serif",cursor:"pointer"}}>← 이전</button>
              <span style={S.tiny}>Q{currentQ+1} / {questions.length}</span>
            </div>
            <span style={{...S.tiny,color:"rgba(59,130,246,1)"}}>{Math.round(progress)}%</span>
          </div>
          <div style={{height:4,background:"rgba(255,255,255,0.07)",borderRadius:99}}>
            <div className="pfill" style={{width:`${progress}%`}}/>
          </div>
        </div>

        <div style={{...S.sl,marginBottom:8}}>상황</div>
        <div style={S.situBox}><p style={S.situTxt}>{questions[currentQ].situation}</p></div>

        <div style={{display:"flex",flexDirection:"column",gap:9,marginTop:18}}>
          {["A","B","C","D"].map((l,i)=>(
            <button key={i} className={`opt${selected===i?" sel":""}`}
              onClick={()=>handleSelect(i)} disabled={selected!==null}>
              <span className="opt-l">{l}</span>
              {questions[currentQ].options[i].text}
            </button>
          ))}
        </div>
      </Card>
    </Wrap>
  );

  // ── RESULT ──────────────────────────────
  if(step==="result"&&result){
    const v=V[result.top], sv=result.second?V[result.second]:null;
    const compat=COMPAT[result.top];
    const others=VList.filter(n=>n!==result.top&&n!==result.second).slice(0,8);
    return (
      <Wrap>
        <Card cls="anim" scroll>
          <div ref={resultRef}>
            <div style={S.userBadge}>
              <span>👤</span>
              <span style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"rgba(255,255,255,0.8)"}}>
                {profile.dept&&<span style={{color:"rgba(255,255,255,0.42)"}}>{profile.dept} · </span>}
                <b style={{color:"white"}}>{profile.nickname||"익명"}</b>님의 결과
              </span>
            </div>

            <CB mb={4}><Lbl>나의 소통 유형은</Lbl></CB>
            <CB mb={16}>
              <div style={{background:`linear-gradient(135deg,${v.color}33,${v.color}55)`,border:`2px solid ${v.color}88`,borderRadius:20,padding:"18px 30px",display:"inline-block"}}>
                <div className="eb" style={{fontSize:46,marginBottom:6}}>{v.emoji}</div>
                <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:24,color:"white"}}>{result.top}</div>
                <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:12,color:`${v.color}cc`,marginTop:4}}>{v.tagline}</div>
                <span style={{...S.badge,background:TAG_COLOR[v.tag]?.bg,color:TAG_COLOR[v.tag]?.label||v.color,border:`1px solid ${TAG_COLOR[v.tag]?.border||v.color}`,marginTop:8,fontWeight:600}}>{v.tag}</span>
              </div>
            </CB>

            <div style={S.descBox}><p style={S.descTxt}>{v.desc}</p></div>

            {/* 저장/공유 버튼 — 설명 바로 아래 */}
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <button onClick={handleSaveImage} disabled={saving}
                style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,padding:"12px",cursor:"pointer",fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"rgba(255,255,255,0.85)",transition:"all .2s"}}>
                {saving?"저장 중…":"📸 이미지 저장"}
              </button>
              <button onClick={handleCopyLink}
                style={{flex:1,background:"linear-gradient(135deg,rgba(16,185,129,0.2) 0%,rgba(59,130,246,0.2) 100%)",border:"1px solid rgba(59,130,246,0.4)",borderRadius:12,padding:"12px",cursor:"pointer",fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"white",transition:"all .2s"}}>
                🔗 링크 복사
              </button>
            </div>

            {/* 유형별 궁합 */}
            {compat&&(
              <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
                <div style={{...S.sl,marginBottom:10}}>💞 유형별 궁합</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10,background:"rgba(46,213,115,0.08)",border:"1px solid rgba(46,213,115,0.25)",borderRadius:10,padding:"10px 12px"}}>
                    <span style={{fontSize:22,flexShrink:0}}>💚</span>
                    <div>
                      <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"#2ed573",marginBottom:3}}>{V[compat.best]?.emoji} {compat.best} — 잘 맞아요</div>
                      <p style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:12,color:"rgba(255,255,255,0.65)",lineHeight:1.55}}>{compat.bestDesc}</p>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10,background:"rgba(255,71,87,0.08)",border:"1px solid rgba(255,71,87,0.25)",borderRadius:10,padding:"10px 12px"}}>
                    <span style={{fontSize:22,flexShrink:0}}>🔴</span>
                    <div>
                      <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"#ff4757",marginBottom:3}}>{V[compat.worst]?.emoji} {compat.worst} — 조심해요</div>
                      <p style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:12,color:"rgba(255,255,255,0.65)",lineHeight:1.55}}>{compat.worstDesc}</p>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div style={{marginBottom:16}}>
              <div style={{...S.sl,marginBottom:10}}>💡 구체적인 성장 팁</div>
              <div style={{display:"flex",flexDirection:"column",gap:9}}>
                {v.tips.map((t,i)=>(
                  <div key={i} style={{background:`linear-gradient(135deg,${v.color}18,transparent)`,border:`1px solid ${v.color}30`,borderRadius:12,padding:"12px 14px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontSize:15}}>{t.icon}</span>
                      <span style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"white"}}>{t.title}</span>
                    </div>
                    <p style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:12.5,color:"rgba(255,255,255,0.72)",lineHeight:1.7,whiteSpace:"pre-line"}}>{t.body}</p>
                  </div>
                ))}
              </div>
            </div>

            {sv&&result.second&&(
              <button className="sv-btn" onClick={()=>openDetail(result.second,"result")}>
                <div style={{fontSize:24}}>{sv.emoji}</div>
                <div style={{flex:1}}>
                  <div style={S.tiny}>숨어있는 두 번째 유형</div>
                  <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:14,color:"white",marginTop:2}}>{result.second}</div>
                  <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:11.5,color:"rgba(255,255,255,0.4)",marginTop:2}}>{sv.tagline} · 자세히 보기 →</div>
                </div>
                <span style={{color:"rgba(255,255,255,0.25)",fontSize:18}}>›</span>
              </button>
            )}

            <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14,marginBottom:14}}>
              <div style={{...S.sl,marginBottom:9}}>🗂️ 다른 빌런 유형 둘러보기</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {others.map(name=>(
                  <button key={name} className="chip" onClick={()=>openDetail(name,"result")} style={{borderColor:`${V[name].color}55`}}>
                    <span>{V[name].emoji}</span>
                    <span style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:11.5,color:"rgba(255,255,255,0.75)"}}>{name}</span>
                  </button>
                ))}
                <button className="chip" onClick={()=>setStep("browse")} style={{borderColor:"rgba(255,255,255,0.18)"}}>
                  <span style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:11.5,color:"rgba(255,255,255,0.45)"}}>전체 16종 →</span>
                </button>
              </div>
            </div>

          </div>{/* /resultRef */}

          <CB style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:14}}>
            <p style={{...S.micro,marginBottom:12}}>빌런을 자각하는 순간, 더 나은 선택을 할 수 있어요 🌱</p>
            <button className="btn-g" onClick={handleRetry}>다시 해보기</button>
          </CB>
        </Card>
      </Wrap>
    );
  }

  if(step==="browse"){
    const tags=["전체","공격형","회피형","교란형","자기중심형"];
    const filtered=VList.filter(n=>browseTag==="전체"||V[n].tag===browseTag);
    return (
      <Wrap>
        <Card cls="anim" scroll>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button className="back" onClick={()=>setStep("result")}>← 결과로</button>
            <span style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:17,color:"white"}}>소통빌런 도감</span>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
            {tags.map(t=>(
              <button key={t} className={`tb${browseTag===t?" on":""}`} onClick={()=>setBrowseTag(t)}>{t}</button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            {filtered.map(name=>{const dv=V[name];return(
              <button key={name} className="dex" onClick={()=>openDetail(name,"browse")}
                style={{background:TAG_COLOR[dv.tag]?.bg||`rgba(0,0,0,0.25)`,border:`1.5px solid ${TAG_COLOR[dv.tag]?.border||dv.color+'44'}`}}>
                <div style={{fontSize:28,marginBottom:4}}>{dv.emoji}</div>
                <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:12.5,color:"white",lineHeight:1.3}}>{name}</div>
                <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:10.5,color:"rgba(255,255,255,0.4)",marginTop:3,lineHeight:1.4}}>{dv.tagline}</div>
                <span style={{...S.badge,background:TAG_COLOR[dv.tag]?.bg,color:TAG_COLOR[dv.tag]?.label||dv.color,border:`1px solid ${TAG_COLOR[dv.tag]?.border||dv.color}`,marginTop:7,fontSize:10,fontWeight:600}}>{dv.tag}</span>
              </button>
            );})}
          </div>
        </Card>
      </Wrap>
    );
  }

  // ── DETAIL ──────────────────────────────
  if(step==="detail"&&detailName){
    const dv=V[detailName];
    const sameTag=VList.filter(n=>n!==detailName&&V[n].tag===dv.tag);
    return (
      <Wrap>
        <Card cls="anim" scroll>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button className="back" onClick={closeDetail}>← 뒤로</button>
            <span style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"rgba(255,255,255,0.45)"}}>빌런 상세 보기</span>
          </div>
          <CB mb={16}>
            <div style={{background:`linear-gradient(135deg,${dv.color}33,${dv.color}55)`,border:`2px solid ${dv.color}77`,borderRadius:18,padding:"16px 28px",display:"inline-block"}}>
              <div className="eb" style={{fontSize:44,marginBottom:6}}>{dv.emoji}</div>
              <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:22,color:"white"}}>{detailName}</div>
              <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:12,color:`${dv.color}bb`,marginTop:3}}>{dv.tagline}</div>
              <span style={{...S.badge,background:TAG_COLOR[dv.tag]?.bg,color:TAG_COLOR[dv.tag]?.label||dv.color,border:`1px solid ${TAG_COLOR[dv.tag]?.border||dv.color}`,marginTop:7,fontWeight:600}}>{dv.tag}</span>
            </div>
          </CB>
          <div style={S.descBox}><p style={S.descTxt}>{dv.desc}</p></div>

          {/* 유형별 궁합 */}
          {COMPAT[detailName]&&(
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
              <div style={{...S.sl,marginBottom:10}}>💞 유형별 궁합</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10,background:"rgba(46,213,115,0.08)",border:"1px solid rgba(46,213,115,0.25)",borderRadius:10,padding:"10px 12px"}}>
                  <span style={{fontSize:22,flexShrink:0}}>💚</span>
                  <div>
                    <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"#2ed573",marginBottom:3}}>{V[COMPAT[detailName].best]?.emoji} {COMPAT[detailName].best} — 잘 맞아요</div>
                    <p style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:12,color:"rgba(255,255,255,0.65)",lineHeight:1.55}}>{COMPAT[detailName].bestDesc}</p>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"flex-start",gap:10,background:"rgba(255,71,87,0.08)",border:"1px solid rgba(255,71,87,0.25)",borderRadius:10,padding:"10px 12px"}}>
                  <span style={{fontSize:22,flexShrink:0}}>🔴</span>
                  <div>
                    <div style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"#ff4757",marginBottom:3}}>{V[COMPAT[detailName].worst]?.emoji} {COMPAT[detailName].worst} — 조심해요</div>
                    <p style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:12,color:"rgba(255,255,255,0.65)",lineHeight:1.55}}>{COMPAT[detailName].worstDesc}</p>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div style={{marginBottom:16}}>
            <div style={{...S.sl,marginBottom:10}}>💡 구체적인 성장 팁</div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {dv.tips.map((t,i)=>(
                <div key={i} style={{background:`linear-gradient(135deg,${dv.color}18,transparent)`,border:`1px solid ${dv.color}30`,borderRadius:12,padding:"12px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:15}}>{t.icon}</span>
                    <span style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:13,color:"white"}}>{t.title}</span>
                  </div>
                  <p style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:12.5,color:"rgba(255,255,255,0.72)",lineHeight:1.7,whiteSpace:"pre-line"}}>{t.body}</p>
                </div>
              ))}
            </div>
          </div>
          {sameTag.length>0&&(
            <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14,marginBottom:14}}>
              <div style={{...S.sl,marginBottom:8}}>같은 {dv.tag} 빌런들</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {sameTag.map(name=>(
                  <button key={name} className="chip" onClick={()=>setDetailName(name)} style={{background:TAG_COLOR[dv.tag]?.bg,borderColor:TAG_COLOR[dv.tag]?.border}}>
                    <span>{V[name].emoji}</span>
                    <span style={{fontFamily:"'Pretendard',-apple-system,sans-serif",fontSize:11.5,color:"rgba(255,255,255,0.75)"}}>{name}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
          <CB><button className="btn-g" onClick={()=>setStep("browse")}>전체 도감 보기</button></CB>
        </Card>
      </Wrap>
    );
  }

  // ── 관리자 로그인 ────────────────────────

  // ── 관리자 패널 ──────────────────────────

  if(step==='sharedResult' && sharedVillain){
    const sv=V[sharedVillain];
    const sc=COMPAT[sharedVillain];
    const F="'Pretendard',-apple-system,sans-serif";
    return(
      <Wrap>
        <Card scroll>
          <div style={{textAlign:'center',marginBottom:8}}>
            <span style={{fontFamily:F,fontSize:12,color:'rgba(16,185,129,0.9)',letterSpacing:'0.1em'}}>친구의 소통 유형 결과</span>
          </div>
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{background:sv.color+'33',border:'2px solid '+sv.color+'88',borderRadius:20,padding:'18px 30px',display:'inline-block'}}>
              <div style={{fontSize:52,marginBottom:8}}>{sv.emoji}</div>
              <div style={{fontFamily:F,fontSize:26,color:'white',fontWeight:800}}>{sharedVillain}</div>
              <div style={{fontFamily:F,fontSize:13,color:sv.color+'cc',marginTop:5}}>{sv.tagline}</div>
              <span style={{display:'inline-block',borderRadius:99,padding:'3px 12px',fontSize:11,fontFamily:F,background:TAG_COLOR[sv.tag]?.bg,color:TAG_COLOR[sv.tag]?.label,border:'1px solid '+TAG_COLOR[sv.tag]?.border,marginTop:10,fontWeight:600}}>{sv.tag}</span>
            </div>
          </div>
          <div style={{background:'rgba(255,255,255,0.05)',borderRadius:12,padding:'13px 15px',marginBottom:14}}>
            <p style={{fontFamily:F,fontSize:13.5,color:'rgba(255,255,255,0.8)',lineHeight:1.78}}>{sv.desc}</p>
          </div>
          {sc&&(
            <div style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.09)',borderRadius:14,padding:'14px 16px',marginBottom:14}}>
              <div style={{fontFamily:F,fontSize:11,color:'rgba(16,185,129,0.85)',letterSpacing:'0.09em',textTransform:'uppercase',marginBottom:10}}>💞 유형별 궁합</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:10,background:'rgba(46,213,115,0.08)',border:'1px solid rgba(46,213,115,0.25)',borderRadius:10,padding:'10px 12px'}}>
                  <span style={{fontSize:20,flexShrink:0}}>💚</span>
                  <div>
                    <div style={{fontFamily:F,fontSize:13,color:'#2ed573',marginBottom:2}}>{V[sc.best]?.emoji} {sc.best} — 잘 맞아요</div>
                    <p style={{fontFamily:F,fontSize:12,color:'rgba(255,255,255,0.65)',lineHeight:1.55}}>{sc.bestDesc}</p>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'flex-start',gap:10,background:'rgba(255,71,87,0.08)',border:'1px solid rgba(255,71,87,0.25)',borderRadius:10,padding:'10px 12px'}}>
                  <span style={{fontSize:20,flexShrink:0}}>🔴</span>
                  <div>
                    <div style={{fontFamily:F,fontSize:13,color:'#ff4757',marginBottom:2}}>{V[sc.worst]?.emoji} {sc.worst} — 조심해요</div>
                    <p style={{fontFamily:F,fontSize:12,color:'rgba(255,255,255,0.65)',lineHeight:1.55}}>{sc.worstDesc}</p>
                  </div>
                </div>
              </div>
            </div>
          )}
          <div style={{marginBottom:14}}>
            <div style={{fontFamily:F,fontSize:11,color:'rgba(16,185,129,0.85)',letterSpacing:'0.09em',textTransform:'uppercase',marginBottom:10}}>💡 성장 팁</div>
            {sv.tips.map((t,i)=>(
              <div key={i} style={{background:sv.color+'18',border:'1px solid '+sv.color+'30',borderRadius:12,padding:'12px 14px',marginBottom:9}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:15}}>{t.icon}</span>
                  <span style={{fontFamily:F,fontSize:13,color:'white',fontWeight:700}}>{t.title}</span>
                </div>
                <p style={{fontFamily:F,fontSize:12.5,color:'rgba(255,255,255,0.72)',lineHeight:1.7,whiteSpace:'pre-line'}}>{t.body}</p>
              </div>
            ))}
          </div>
          <div style={{textAlign:'center',borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:16}}>
            <p style={{fontFamily:F,fontSize:13,color:'rgba(255,255,255,0.45)',marginBottom:14}}>나는 어떤 소통빌런일까? 🤔</p>
            <button onClick={()=>{setStep('profile');window.history.replaceState(null,'',window.location.pathname);}}
              style={{width:'100%',background:'linear-gradient(135deg,#10B981 0%,#3B82F6 100%)',color:'white',border:'none',borderRadius:13,padding:15,fontSize:15,fontWeight:700,fontFamily:F,cursor:'pointer',boxShadow:'0 4px 20px rgba(16,185,129,0.3)'}}>
              🦹 나도 테스트 해보기
            </button>
          </div>
        </Card>
      </Wrap>
    );
  }
  return null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 서브 컴포넌트
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Wrap({children}){
  return(
    <div style={S.root}>
      <style>{CSS}</style>
      <div style={S.bg}/><div style={S.dots}/>
      <div style={S.wrap}>{children}</div>
    </div>
  );
}
function Card({children,cls,scroll}){
  return <div className={cls} style={{...S.card,...(scroll?{maxHeight:"90vh",overflowY:"auto"}:{})}}>{children}</div>;
}
function CB({children,mb,style}){ return <div style={{textAlign:"center",marginBottom:mb||0,...style}}>{children}</div>; }
function Lbl({children}){ return <span style={S.lbl}>{children}</span>; }
